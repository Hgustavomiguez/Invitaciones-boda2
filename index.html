<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Boda | 14.11.2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blanco-papel: #F9F9F9;
            --azul-electrico: #0046FF; /* Color de acento vibrante [cite: 10] */
            --negro-carbon: #1A1A1A;
            --gris-pliegue: #E0E0E0;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--blanco-papel);
            color: var(--negro-carbon);
            text-align: center;
            overflow-x: hidden;
        }

        /* Estilo Papiroflexia (Origami) */
        .seccion {
            padding: 50px 20px;
            margin: 20px auto;
            max-width: 500px;
            background: white;
            box-shadow: 10px 10px 0px var(--gris-pliegue); /* Efecto de pliegue geométrico */
            border: 1px solid #eee;
            position: relative;
        }

        .foto-principal {
            width: 100%;
            height: 400px;
            background: #ccc url('URL_DE_TU_FOTO_AQUÍ') center/cover;
            clip-path: polygon(0% 0%, 100% 0%, 100% 90%, 50% 100%, 0% 90%); /* Corte estilo diamante/origami */
        }

        h1 { font-family: 'Montserrat', sans-serif; text-transform: uppercase; letter-spacing: 3px; }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: var(--azul-electrico);
            color: white;
            text-decoration: none;
            border-radius: 0px; /* Bordes rectos para minimalismo */
            margin-top: 10px;
            font-weight: 600;
            transition: 0.3s;
        }

        .galeria {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .galeria img { width: 100%; height: 150px; object-fit: cover; background: #eee; }

        #countdown { font-size: 1.5rem; font-weight: bold; color: var(--azul-electrico); }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid var(--gris-pliegue);
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="foto-principal"></div>
    <h1>Nuestra Boda</h1>
    <p>14 de Noviembre de 2026</p>

    <div class="seccion">
        <h3>Faltan:</h3>
        <div id="countdown">Cargando...</div>
    </div>

    <div class="seccion">
        <h2>⛪ Ceremonia y Fiesta</h2>
        <p>Acompañanos en este día tan especial.</p>
        <a href="https://maps.google.com" class="btn">📍 Ver en Google Maps</a>
        <br><br>
        <a href="#" id="btnCalendar" class="btn" style="background:#333;">📅 Agendar Fecha</a>
    </div>

    <div class="seccion">
        <h2>Nuestra Historia</h2>
        <div class="galeria">
            <img src="FOTO1" alt="Boda 1">
            <img src="FOTO2" alt="Boda 2">
            <img src="FOTO3" alt="Boda 3">
            <img src="FOTO4" alt="Boda 4">
        </div>
    </div>

    <div class="seccion">
        <h2>🎁 Regalo y Tarjeta</h2>
        <p>Valor de la tarjeta: $XXXXX</p>
        <p>Si deseas hacernos un regalo:</p>
        <strong>ALIAS: Boda.Flujera.2026</strong>
    </div>

    <div class="seccion">
        <h2>Confirmación</h2>
        <form id="rsvpForm">
            <input type="text" id="nombre" placeholder="Tu nombre completo" required>
            <select id="restriccion">
                <option value="Sin restricciones">Sin restricciones alimentarias</option>
                <option value="Celiaquía">Celiaquía</option>
                <option value="Vegetariana">Vegetariana</option>
                <option value="Vegana">Vegana</option>
                <option value="Otra">Otra (especificar)</option>
            </select>
            <textarea id="detalle" placeholder="Escribe aquí si tienes otra restricción o detalle..."></textarea>
            <button type="button" onclick="enviarWhatsapp()" class="btn">Confirmar por WhatsApp</button>
        </form>
    </div>

    <script>
        // Lógica del Countdown
        const targetDate = new Date("Nov 14, 2026 18:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = targetDate - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("countdown").innerHTML = `${days}d ${hours}h`;
        }, 1000);

        // Envío a WhatsApp [cite: 31, 45]
        function enviarWhatsapp() {
            const nombre = document.getElementById('nombre').value;
            const restriccion = document.getElementById('restriccion').value;
            const detalle = document.getElementById('detalle').value;
            const telefono = "54911XXXXXXXX"; // Reemplazar con tu número
            
            const mensaje = `¡Hola! Confirmo mi asistencia a la boda. %0A*Nombre:* ${nombre}%0A*Restricción:* ${restriccion}%0A*Detalle:* ${detalle}`;
            window.open(`https://wa.me/${telefono}?text=${mensaje}`);
        }
    </script>
</body>
</html>
